<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodKing | Premium Dining</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
        
</head>
<body class="bg-gray-950 text-gray-100 font-sans">

    <nav class="fixed w-full z-50 glass p-4 flex justify-between items-center px-6 md:px-12 no-print">
        <h1 class="text-2xl font-black tracking-tighter text-orange-500">FOOD <span class="text-white">KING</span></h1>
        <button onclick="toggleCart()" class="bg-orange-500 px-3 py-1 rounded-full font-bold shadow-lg transition-transform active:scale-95">Cart (<span id="cartCount">0</span>)</button>
    </nav>

    <header class="h-[30vh] hero-bg flex items-center justify-center text-center px-4 no-print">
        <div data-aos="zoom-in">
            <h2 class="text-5xl font-black tracking-tighter uppercase">Food <span class="text-orange-500">Collections</span></h2>
        </div>
    </header>

    <main class="py-12 px-6 max-w-7xl mx-auto no-print">
        <div id="food-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
    </main>

    <div id="cartSidebar" class="fixed top-0 right-0 h-full w-full md:w-96 bg-gray-900 z-[100] shadow-2xl transform translate-x-full transition-transform duration-500 p-8 flex flex-col no-print border-l border-gray-800">
        <div class="flex justify-between items-center mb-8 font-black text-3xl"><h2>Your Cart</h2><button onclick="toggleCart()">✕</button></div>
        <div id="cartItems" class="flex-grow space-y-4 overflow-y-auto"></div>
        <div class="pt-6 border-t border-gray-800">
            <div class="flex justify-between text-2xl font-black mb-6"><span>Total</span><span id="cartTotal">₹0</span></div>
            <button onclick="openCheckout()" class="w-full bg-orange-500 text-white py-5 rounded-2xl font-black text-xl hover:bg-orange-600 transition">Checkout</button>
        </div>
    </div>

    <div id="checkoutModal" class="fixed inset-0 z-[200] hidden bg-black/95 backdrop-blur-md flex items-center justify-center p-4 no-print">
        <div class="bg-gray-900 w-full max-w-xl rounded-[3rem] p-8 border border-gray-800 overflow-y-auto max-h-[90vh]">
            
            <div id="stepAddress">
                <h2 class="text-3xl font-black mb-6 text-orange-500 text-center">Delivery Details</h2>
                <form onsubmit="toPayment(event)" class="space-y-4">
                    <input type="text" id="custName" required placeholder="Full Name" class="w-full p-4 rounded-xl bg-gray-800 border border-gray-700 outline-none">
                    <input type="text" id="custPhone" required placeholder="Phone Number" class="w-full p-4 rounded-xl bg-gray-800 border border-gray-700 outline-none">
                    <input type="email" id="custEmail" required placeholder="Email" class="w-full p-4 rounded-xl bg-gray-800 border border-gray-700 outline-none">
                    <textarea id="custAddr" required placeholder="Full Delivery Address" class="w-full p-4 rounded-xl bg-gray-800 border border-gray-700 h-24 outline-none"></textarea>
                    <input type="text" id="custPin" required pattern="[0-9]{6}" maxlength="6" placeholder="Pincode (6-digits)" class="w-full p-4 rounded-xl bg-gray-800 border border-gray-700 outline-none focus:border-orange-500">
                    
                    <button type="submit" class="w-full bg-orange-500 py-4 rounded-2xl font-black text-lg mt-4">Continue to Payment</button>
                </form>
            </div>

            <div id="stepPayment" class="hidden">
                <h2 class="text-3xl font-black mb-6 text-orange-500 text-center">Payment</h2>
                <div class="flex gap-2 mb-6">
                    <button onclick="switchTab('card')" id="tab-card" class="pay-tab active flex-1 p-3 border-2 border-gray-700 rounded-xl text-[10px] font-bold uppercase">Debit Card</button>
                    <button onclick="switchTab('net')" id="tab-net" class="pay-tab flex-1 p-3 border-2 border-gray-700 rounded-xl text-[10px] font-bold uppercase">Net Banking</button>
                    <button onclick="switchTab('upi')" id="tab-upi" class="pay-tab flex-1 p-3 border-2 border-gray-700 rounded-xl text-[10px] font-bold uppercase">UPI / QR</button>
                </div>

                <div id="pay-content" class="bg-gray-800 p-6 rounded-2xl mb-6 text-center">
                    <div id="view-card" class="space-y-3">
                        <input type="text" placeholder="Card Number" class="w-full p-3 rounded-lg bg-gray-900 border border-gray-700">
                        <div class="flex gap-2">
                            <input type="text" placeholder="MM/YY" class="w-1/2 p-3 rounded-lg bg-gray-900 border border-gray-700">
                            <input type="password" placeholder="CVV" class="w-1/2 p-3 rounded-lg bg-gray-900 border border-gray-700">
                        </div>
                    </div>
                    <div id="view-net" class="hidden">
                        <select class="w-full p-3 rounded-lg bg-gray-900 border border-gray-700">
                            <option>Select Bank</option><option>SBI</option><option>HDFC</option><option>ICICI</option>
                        </select>
                    </div>
                    <div id="view-upi" class="hidden">
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=FoodKingPay" class="mx-auto border-4 border-white rounded-lg">
                    </div>
                </div>
                <button onclick="confirmOrder()" class="w-full bg-orange-500 py-4 rounded-2xl font-black text-lg">Confirm & Pay ₹<span class="finalAmt">0</span></button>
            </div>

            <button onclick="closeCheckout()" class="w-full mt-4 text-xs opacity-50 underline">Go Back</button>
        </div>
    </div>

    <div id="receipt-print" class="hidden p-10 text-black bg-white font-mono">
        <center><h1 style="font-size: 24px; font-weight: 900; color: #f97316;">FOOD KING</h1></center>
        <hr style="border: 1px dashed #000; margin: 15px 0;">
        <div id="printDetails"></div>
        <hr style="border: 1px dashed #000; margin: 15px 0;">
        <div id="printItemsList"></div>
        <hr style="border: 1px dashed #000; margin: 15px 0;">
        <h2 style="text-align: right;">Total Paid: ₹<span id="printTotal"></span></h2>
    </div>

    <script src="script.js"></script>
    
</body>
</html>
